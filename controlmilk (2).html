<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CONTROL MILK</title>

  <!-- GOOGLE FONT -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <!-- ADMIN LTE -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

  <style>

    body{
      font-family:'Source Sans Pro', sans-serif;
    }

    .content-section{
      display:none;
    }

    .content-section.active{
      display:block;
    }

    #main-app{
      display:none;
    }

    .readonly{
      background:#e9ecef;
    }

    #reader{
      width:100%;
      border-radius:10px;
      overflow:hidden;
    }

    .scanner-box{
      border:2px dashed #28a745;
      border-radius:10px;
      padding:10px;
      background:#f8f9fa;
    }

    .curso-info{
      margin-top:15px;
      font-size:18px;
      font-weight:bold;
      text-align:center;
    }

    @media (max-width:768px){

      .content-wrapper,
      .main-header,
      .main-footer{
        margin-left:0 !important;
      }

      .main-sidebar{
        margin-left:-250px;
      }

      .sidebar-open .main-sidebar{
        margin-left:0;
      }

      .table{
        font-size:12px;
      }

      .btn{
        font-size:12px;
      }

      .login-box{
        width:95%;
      }

    }

  </style>

</head>

<body class="hold-transition sidebar-mini layout-fixed">

  <!-- LOGIN -->
  <div class="login-box" id="login-screen">

    <div class="card card-outline card-primary">

      <div class="card-header text-center">

        <h1>
          <b>CONTROL</b> MILK
        </h1>

      </div>

      <div class="card-body">

        <div class="input-group mb-3">

          <input
            type="text"
            id="user"
            class="form-control"
            placeholder="Usuario">

          <div class="input-group-append">

            <div class="input-group-text">

              <span class="fas fa-user"></span>

            </div>

          </div>

        </div>

        <div class="input-group mb-3">

          <input
            type="password"
            id="pass"
            class="form-control"
            placeholder="Contraseña">

          <div class="input-group-append">

            <div class="input-group-text">

              <span class="fas fa-lock"></span>

            </div>

          </div>

        </div>

        <button
          class="btn btn-primary btn-block"
          onclick="checkLogin()">

          ACCEDER

        </button>

      </div>

    </div>

  </div>

  <!-- APP -->
  <div class="wrapper" id="main-app">

    <!-- NAVBAR -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">

      <ul class="navbar-nav">

        <li class="nav-item">

          <a class="nav-link"
            data-widget="pushmenu"
            href="#"
            role="button">

            <i class="fas fa-bars"></i>

          </a>

        </li>

        <li class="nav-item">

          <span class="nav-link font-weight-bold text-primary">

            CONTROL MILK

          </span>

        </li>

      </ul>

      <ul class="navbar-nav ml-auto">

        <li class="nav-item">

          <button
            class="btn btn-outline-danger btn-sm"
            onclick="location.reload()">

            Salir

          </button>

        </li>

      </ul>

    </nav>

    <!-- SIDEBAR -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">

      <a href="#" class="brand-link text-center bg-primary">

        <span class="brand-text font-weight-bold">

          CONTROL MILK

        </span>

      </a>

      <div class="sidebar">

        <nav class="mt-2">

          <ul class="nav nav-pills nav-sidebar flex-column">

            <li class="nav-item">

              <a href="#"
                class="nav-link active"
                onclick="showSection('section-registro', this)">

                <i class="nav-icon fas fa-plus"></i>

                <p>Nuevo Ingreso</p>

              </a>

            </li>

            <li class="nav-item">

              <a href="#"
                class="nav-link"
                onclick="showSection('section-stock', this)">

                <i class="nav-icon fas fa-boxes"></i>

                <p>Existencias</p>

              </a>

            </li>

            <li class="nav-item">

              <a href="#"
                class="nav-link"
                onclick="showSection('section-kardex', this)">

                <i class="nav-icon fas fa-history"></i>

                <p>Kardex</p>

              </a>

            </li>

          </ul>

        </nav>

      </div>

    </aside>

    <!-- CONTENIDO -->
    <div class="content-wrapper">

      <!-- NUEVO INGRESO -->
      <section
        id="section-registro"
        class="content-section active pt-3">

        <div class="container-fluid">

          <div class="row justify-content-center">

            <div class="col-md-6">

              <div class="card card-primary">

                <div class="card-header">

                  <h3 class="card-title">

                    Registrar Producto

                  </h3>

                </div>

                <form id="productForm">

                  <div class="card-body">

                    <div class="form-group">

                      <label>Código</label>

                      <input
                        type="text"
                        id="codigo"
                        class="form-control"
                        required>

                    </div>

                    <div class="form-group">

                      <label>Producto</label>

                      <input
                        type="text"
                        id="nombre"
                        class="form-control readonly"
                        readonly>

                    </div>

                    <div class="form-group">

                      <label>Categoría</label>

                      <input
                        type="text"
                        id="categoria"
                        class="form-control readonly"
                        readonly>

                    </div>

                    <div class="form-group">

                      <label>Cantidad</label>

                      <input
                        type="number"
                        id="cantidad"
                        class="form-control"
                        value="1"
                        min="1">

                    </div>

                  </div>

                  <div class="card-footer">

                    <button
                      type="submit"
                      class="btn btn-primary btn-block">

                      Guardar Producto

                    </button>

                  </div>

                </form>

              </div>

            </div>

          </div>

        </div>

      </section>

      <!-- STOCK -->
      <section
        id="section-stock"
        class="content-section pt-3">

        <div class="container-fluid">

          <div class="card">

            <div class="card-header">

              <h3 class="card-title">

                Existencias

              </h3>

            </div>

            <div class="card-body table-responsive p-0">

              <table class="table table-bordered">

                <thead>

                  <tr>

                    <th>Código</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Stock</th>
                    <th>Acción</th>

                  </tr>

                </thead>

                <tbody id="inventoryBody"></tbody>

              </table>

            </div>

          </div>

        </div>

      </section>

      <!-- KARDEX -->
      <section
        id="section-kardex"
        class="content-section pt-3">

        <div class="container-fluid">

          <div class="card">

            <div class="card-header d-flex justify-content-between align-items-center">

              <h3 class="card-title">

                Kardex

              </h3>

              <button
                class="btn btn-success btn-sm"
                onclick="exportarExcel()">

                <i class="fas fa-file-excel"></i>

                Exportar Excel

              </button>

            </div>

            <div class="card-body table-responsive p-0">

              <table class="table table-bordered table-sm">

                <thead>

                  <tr>

                    <th>Curso</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Fecha</th>

                  </tr>

                </thead>

                <tbody id="kardexBody"></tbody>

              </table>

            </div>

          </div>

        </div>

      </section>

    </div>

  </div>

  <!-- MODAL -->
  <div class="modal fade" id="modalEntrega">

    <div class="modal-dialog">

      <div class="modal-content">

        <div class="modal-header bg-success text-white">

          <h4 class="modal-title">

            Escanear Curso

          </h4>

        </div>

        <div class="modal-body">

          <input type="hidden" id="prodCodModal">

          <div class="scanner-box">

            <div id="reader"></div>

          </div>

          <div
            class="curso-info"
            id="cursoDetectado">

            Esperando escaneo...

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- JQUERY -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <!-- BOOTSTRAP -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ADMIN LTE -->
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

  <!-- QR -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- EXCEL -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>

    // LOGIN
    function checkLogin(){

      if(
        document.getElementById('user').value === 'admin' &&
        document.getElementById('pass').value === 'admin'
      ){

        document.getElementById('login-screen').style.display='none';

        document.getElementById('main-app').style.display='block';

      }else{

        alert('Credenciales incorrectas');

      }
    }

    // CURSOS
    const cursosData = {

      "OCTAVO-A":20,
      "OCTAVO-B":24,
      "OCTAVO-C":20,
      "OCTAVO-D":21,

      "NOVENO-A":22,
      "NOVENO-B":20,
      "NOVENO-C":21,
      "NOVENO-D":21,

      "DECIMO-A":23,
      "DECIMO-B":22,
      "DECIMO-C":19,
      "DECIMO-D":25

    };

    // PRODUCTOS
    const productosSistema = {

      "001":{nombre:"CHOCOLATE",categoria:"Leches"},
      "002":{nombre:"VAINILLA",categoria:"Leches"},
      "003":{nombre:"FRESA",categoria:"Leches"},
      "004":{nombre:"NECTAR PERA",categoria:"Jugos"},
      "005":{nombre:"NECTAR BANANO PERA",categoria:"Jugos"},
      "006":{nombre:"NECTAR MANGO BANANO",categoria:"Jugos"},
      "007":{nombre:"PURE PERA BANANO PINA",categoria:"Purés"},
      "008":{nombre:"CEREAL JAMON SERRANO",categoria:"Barras Nutricionales"},
      "009":{nombre:"CEREAL TOMATE ALBACA",categoria:"Barras Nutricionales"},
      "010":{nombre:"GALLETA COCO",categoria:"Galletas"},
      "011":{nombre:"GALLETA SAL TOMATE QUESO",categoria:"Galletas"},
      "012":{nombre:"GALLETA VAINILLA",categoria:"Galletas"},
      "013":{nombre:"GRANOLA FRUTOS TROPICALES",categoria:"Barras Nutricionales"},
      "014":{nombre:"LECHE ENTERA",categoria:"Leches"}

    };

    // STOCK
    let dataStock = [];

    Object.keys(productosSistema).forEach(codigo => {

      dataStock.push({

        codigo:codigo,
        nombre:productosSistema[codigo].nombre,
        categoria:productosSistema[codigo].categoria,
        cantidad:100

      });

    });

    // KARDEX
    let dataKardex = [];

    // SCANNER
    let scannerActivo = null;

    // SECCIONES
    function showSection(id, element){

      $('.content-section').removeClass('active');

      $('#' + id).addClass('active');

      $('.nav-link').removeClass('active');

      $(element).addClass('active');
    }

    // RENDER
    function render(){

      document.getElementById('inventoryBody').innerHTML =

        dataStock.map(p => `

          <tr>

            <td>${p.codigo}</td>
            <td>${p.nombre}</td>

            <td>

              <span class="badge badge-info">

                ${p.categoria}

              </span>

            </td>

            <td>

              <strong>${p.cantidad}</strong>

            </td>

            <td>

              <button
                class="btn btn-success btn-sm"
                onclick="openEntrega('${p.codigo}')">

                <i class="fas fa-qrcode"></i>

                Escanear

              </button>

            </td>

          </tr>

        `).join('');

      document.getElementById('kardexBody').innerHTML =

        dataKardex.map(k => `

          <tr>

            <td>${k.curso}</td>
            <td>${k.producto}</td>
            <td>${k.cantidad}</td>
            <td>${k.fecha}</td>

          </tr>

        `).join('');
    }

    render();

    // AUTOCOMPLETAR
    document
      .getElementById('codigo')
      .addEventListener('input', function(){

        const codigo = this.value.trim();

        if(productosSistema[codigo]){

          document.getElementById('nombre').value =
            productosSistema[codigo].nombre;

          document.getElementById('categoria').value =
            productosSistema[codigo].categoria;

        }else{

          document.getElementById('nombre').value='';

          document.getElementById('categoria').value='';

        }

      });

    // MODAL
    function openEntrega(codigo){

      document.getElementById('prodCodModal').value = codigo;

      $('#modalEntrega').modal('show');

      iniciarScanner();
    }

    // SCANNER
    function iniciarScanner(){

      scannerActivo = new Html5Qrcode('reader');

      scannerActivo.start(

        { facingMode:'environment' },

        {
          fps:10,
          qrbox:250
        },

        (decodedText) => {

          procesarCurso(decodedText);

        }

      );
    }

    // PROCESAR
    function procesarCurso(curso){

      curso = curso.trim().toUpperCase();

      if(!cursosData[curso]){

        alert('Curso no registrado');

        return;
      }

      const cantidadCurso = cursosData[curso];

      const codigoProducto =
        document.getElementById('prodCodModal').value;

      const producto =
        dataStock.find(p => p.codigo === codigoProducto);

      if(producto.cantidad < cantidadCurso){

        alert('Stock insuficiente');

        return;
      }

      producto.cantidad -= cantidadCurso;

      dataKardex.push({

        curso:curso,
        producto:producto.nombre,
        cantidad:cantidadCurso,
        fecha:new Date().toLocaleString()

      });

      render();

      document.getElementById('cursoDetectado').innerHTML =

        `
          <div class="alert alert-success">

            <h5>${curso}</h5>

            <strong>
              Descontado: ${cantidadCurso}
            </strong>

          </div>
        `;

      scannerActivo.stop();

      setTimeout(() => {

        $('#modalEntrega').modal('hide');

      }, 1500);
    }

    // FORMULARIO
    document
      .getElementById('productForm')
      .addEventListener('submit', function(e){

        e.preventDefault();

        const codigo =
          document.getElementById('codigo').value;

        const cantidad =
          parseInt(
            document.getElementById('cantidad').value
          );

        if(!productosSistema[codigo]){

          alert('Código no registrado');

          return;
        }

        const existe =
          dataStock.find(p => p.codigo === codigo);

        if(existe){

          existe.cantidad += cantidad;

        }

        render();

        this.reset();

        document.getElementById('nombre').value='';
        document.getElementById('categoria').value='';

        alert('Stock actualizado');
      });

    // EXPORTAR EXCEL
    function exportarExcel(){

      if(dataKardex.length === 0){

        alert('No hay datos en kardex');

        return;
      }

      const worksheet =
        XLSX.utils.json_to_sheet(dataKardex);

      const workbook =
        XLSX.utils.book_new();

      XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        'Kardex'
      );

      XLSX.writeFile(
        workbook,
        'KARDEX_CONTROL_MILK.xlsx'
      );
    }

  </script>

</body>
</html>
